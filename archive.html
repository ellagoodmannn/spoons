<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>archive — spoons</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @font-face {
      font-family: 'GT Haptik';
      src: url('fonts/GT-Haptik-Regular.woff') format('woff');
      font-weight: 400;
    }
    @font-face {
      font-family: 'GT Haptik';
      src: url('fonts/GT-Haptik-Black.woff') format('woff');
      font-weight: 900;
    }
    @font-face {
      font-family: 'Politip';
      src: url('fonts/Politip.ttf') format('truetype');
      font-weight: 700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      background: #fff;
      color: #000;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 18px 28px;
      gap: 20px;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }

    .logo {
      font-family: 'Politip', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: #000;
      text-decoration: none;
      font-variation-settings: 'wght' 200, 'wdth' 10, 'HGHT' -20;
    }

    .tagline {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #000;
      flex: 1;
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-links a {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      background: #7ef07e;
      color: #000;
      text-decoration: none;
      padding: 6px 14px;
    }

    .nav-links a:hover { background: #5ed45e; }

    main {
      padding: 32px 28px 60px;
    }

    h1 {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: #e2fae2;
      position: relative;
      aspect-ratio: 1;
    }

    .card canvas {
  width: 100%;
  aspect-ratio: 1;
  display: block;
  background: #fff;
    }

    .card-label {
      font-size: 0.7rem;
      color: #888;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .loading-msg {
      font-size: 0.95rem;
      color: #888;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">spoons</a>
    <p class="tagline">A formal investigation of the humble messengers, spoons.<br>Welcome to my degree project website.</p>
    <div class="nav-links">
      <a href="/about.html">About</a>
      <a href="#">Projects</a>
    </div>
  </nav>

  <main>
    <h1>Archive ↓</h1>
    <p class="loading-msg" id="loadingMsg">Loading drawings...</p>
    <div class="grid" id="grid"></div>
  </main>

  <script>
    const db = window.supabase.createClient(
      'https://lkqpdcmggssrlboawcup.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrcXBkY21nZ3Nzcmxib2F3Y3VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTgxMzYsImV4cCI6MjA5NDI5NDEzNn0.rmARbJS6EdB8CTQTvMDMYs1FrMJUCXckVq90eFErkvE'
    );

    async function loadDrawings() {
      const { data, error } = await db
        .from('drawings')
        .select('*')
        .order('created_at', { ascending: false });

      document.getElementById('loadingMsg').style.display = 'none';

      if (error || !data.length) {
        document.getElementById('loadingMsg').textContent = 'No drawings yet.';
        document.getElementById('loadingMsg').style.display = 'block';
        return;
      }

      const grid = document.getElementById('grid');

      for (const drawing of data) {
        const wrapper = document.createElement('div');

        const canvas = document.createElement('canvas');
        canvas.width = 400;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');

        wrapper.appendChild(canvas);

        const label = document.createElement('p');
        label.className = 'card-label';
        label.textContent = drawing.matched_spoon.replace('.png','').replace(/-/g,' ');
        wrapper.appendChild(label);

        wrapper.className = 'card';
        grid.appendChild(wrapper);

        // animate the drawing
        animateDrawing(ctx, drawing.strokes, canvas.width, canvas.height);
      }
    }

    function animateDrawing(ctx, strokes, w, h) {
      ctx.strokeStyle = '#7ef07e';
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const allPoints = [];
      for (const stroke of strokes) {
        allPoints.push({ type: 'move', ...stroke[0] });
        for (let i = 1; i < stroke.length; i++) {
          allPoints.push({ type: 'line', ...stroke[i] });
        }
        allPoints.push({ type: 'end' });
      }

      // scale points to canvas size
      const scaleX = w / 1000;
      const scaleY = h / 500;

      let i = 0;
      function step() {
        if (i >= allPoints.length) return;
        const pt = allPoints[i];
        if (pt.type === 'move') {
          ctx.beginPath();
          ctx.moveTo(pt.x * scaleX, pt.y * scaleY);
        } else if (pt.type === 'line') {
          ctx.lineTo(pt.x * scaleX, pt.y * scaleY);
          ctx.stroke();
        }
        i++;
        setTimeout(step, 8);
      }
      step();
    }

    loadDrawings();
  </script>

</body>
</html>
