<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spoons</title>

  <style>
    @font-face {
      font-family: 'GT Haptik';
      src: url('fonts/GT-Haptik-Regular.woff') format('woff');
      font-weight: 400;
    }
    @font-face {
      font-family: 'GT Haptik';
      src: url('fonts/GT-Haptik-Black.woff') format('woff');
      font-weight: 900;
    }
    @font-face {
      font-family: 'Politip';
      src: url('fonts/Politip.ttf') format('truetype');
      font-weight: 700;
    }

    body {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      background: #fff;
      color: #000;
    }

    /* NAV */
    nav {
      display: flex;

      padding: 18px 28px;
      gap: 20px;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }

    .logo {
      font-family: 'Politip', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: #000;
      text-decoration: none;
      font-variation-settings: 'wght' 200, 'wdth' 10, 'HGHT' -20;
    }

    .tagline {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #000;
      flex: 1;
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-links a {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      background: #7ef07e;
      color: #000;
      text-decoration: none;
      padding: 6px 14px;
    }

    .nav-links a:hover {
      background: #5ed45e;
    }

    /* MAIN */
    main {
      padding: 32px 0 60px;
    }

    h1 {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 900;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      line-height: 1.1;
      margin-bottom: 24px;
      padding: 0 28px;
    }

    /* CANVAS AREA */
    .canvas-wrap {
      position: relative;
      width: 33vw;
      margin: 0 auto;
      background: #e2fae2;
      overflow: hidden;
      cursor: url('cursor-spoon.png') 16 16, crosshair;
       height: calc(50vh - 80px);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .canvas-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 1rem;
      color: rgba(0,0,0,0.3);
      pointer-events: none;
      transition: opacity 0.3s;
      text-align: center;
    }

    .clear-btn {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 0.85rem;
      background: #fff;
      border: 1px solid #000;
      padding: 6px 14px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .clear-btn:hover { background: #f0f0f0; }
    .archive-btn {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-family: 'GT Haptik', sans-serif;
  font-weight: 400;
  font-size: 0.85rem;
  background: #fff;
  border: 1px solid #000;
  padding: 6px 14px;
  text-decoration: none;
  color: #000;
}

.archive-btn:hover { background: #f0f0f0; }

    /* RESULT */
.result-wrap {
  display: none;
  margin-top: 16px;
  max-height: 250px;
}

.result-wrap.visible {
  display: block;
}

.result-wrap.visible {
  display: block;
}


    .result-drawing,
    .result-match {
      flex: 1;
    }

    .result-label {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #000;
      margin-bottom: 12px;
      padding: 0 28px;
    }

    .result-drawing img,
    .result-match-img {
      width: 100%;
      background: transparent;
      display: block;
    }

    .result-match-img {
      object-fit: contain;
      max-height: 220px;
    }

    .match-name {
      font-family: 'GT Haptik', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      margin-top: 12px;
      padding: 0 28px;
    }

    /* LOADING */
    .loading {
      display: none;
      margin-top: 32px;
      font-family: 'GT Haptik', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      color: #7ef07e;
      padding: 0 28px;
    }

    .loading.visible { display: block; }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">spoons</a>
    <p class="tagline">A formal investigation of the humble messengers, spoons.<br>Welcome to my degree project website.</p>
    <div class="nav-links">
      <a href="/about.html">About</a>
      <a href="#">Projects</a>
    </div>
  </nav>

  <main>
    <h1>See a spoon, leave a spoon</h1>

<div class="canvas-wrap" id="canvasWrap">
      <canvas id="drawCanvas"></canvas>
      <div class="canvas-hint" id="hint"></div>
<button class="clear-btn" id="clearBtn" onclick="clearCanvas()">Clear</button>
<a class="archive-btn" href="/archive.html">See all drawn spoons</a>
    </div>

    <div class="loading" id="loading">Looking for the closest spoon...</div>

    <div class="result-wrap" id="resultWrap">
      <div class="result-match">
        <p class="result-label">The closest spoon to your drawing.</p>
        <img class="result-match-img" id="matchImg" src="" alt="Matched spoon">
        <p class="match-name" id="matchName"></p>
      </div>
    </div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    
  
    const db = window.supabase.createClient(
      'https://lkqpdcmggssrlboawcup.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrcXBkY21nZ3Nzcmxib2F3Y3VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTgxMzYsImV4cCI6MjA5NDI5NDEzNn0.rmARbJS6EdB8CTQTvMDMYs1FrMJUCXckVq90eFErkvE'
    )
 
   const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const hint = document.getElementById('hint');
const clearBtn = document.getElementById('clearBtn');

let drawing = false;
let hasDrawn = false;
let matchTimer = null;
let strokes = [];
let currentStroke = [];

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.offsetWidth * dpr;
  canvas.height = wrap.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#7ef07e';
  ctx.lineWidth = 18;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: src.clientX - rect.left,
    y: src.clientY - rect.top
  };
}

function startDraw(e) {
  drawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
  hint.style.opacity = '0';
  clearTimeout(matchTimer);
  strokes = [];
  currentStroke = [];
}

function draw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  hasDrawn = true;
  clearBtn.style.opacity = '1';
  currentStroke.push({x: pos.x, y: pos.y});
}

function endDraw() {
  if (!drawing) return;
  drawing = false;
  if (currentStroke.length) {
    strokes.push(currentStroke);
    currentStroke = [];
  }
  if (hasDrawn) {
    matchTimer = setTimeout(findMatch, 1200);
  }
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', () => { drawing = false; });
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
  hint.style.opacity = '1';
  clearBtn.style.opacity = '0';
  clearTimeout(matchTimer);
  strokes = [];
  currentStroke = [];
  document.getElementById('resultWrap').classList.remove('visible');
  document.getElementById('loading').classList.remove('visible');
}

let spoonsData = null;

async function loadSpoons() {
  const res = await fetch('spoons.json');
  spoonsData = await res.json();
}

loadSpoons();

async function findMatch() {
  const dataURL = canvas.toDataURL('image/png');
  document.getElementById('loading').classList.add('visible');
  document.getElementById('resultWrap').classList.remove('visible');

  if (!spoonsData) await loadSpoons();

  try {
    const response = await fetch('/api/match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataURL, spoons: spoonsData })
    });

    const data = await response.json();

    document.getElementById('loading').classList.remove('visible');
    document.getElementById('matchImg').src = 'spoons/' + data.filename;
    document.getElementById('matchName').textContent = data.filename
      .replace('.png','')
      .replace(/-/g,' ')
      .replace(/(\d+)\s(\d+)/g, '$1.$2')
      .replace(/\b\w/g, c => c.toUpperCase())
      .replace(/\bIn\b/g, 'in')
      .replace(/\bX\b/g, 'x');
    document.getElementById('resultWrap').classList.add('visible');

    await db.from('drawings').insert({
      strokes: strokes,
      matched_spoon: data.filename
    });

  } catch (err) {
    document.getElementById('loading').classList.remove('visible');
    console.error('Match failed:', err);
  }
}


  </script>

</body>
</html>
